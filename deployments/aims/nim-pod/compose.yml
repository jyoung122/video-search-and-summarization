# AIMS NIM pod — Cosmos-Reason2-8B (VLM) + Nemotron-Nano-9B-v2 (LLM), BF16,
# co-resident on a single RTX PRO 6000 Blackwell (96 GB).
#
# Reuses the per-model compose files under deployments/nim/. The compose
# profiles selected by .env (vlm_local_shared_cosmos-reason2-8b and
# llm_local_shared_nvidia-nemotron-nano-9b-v2) bring up the *-shared-gpu
# service variants which both bind to SHARED_LLM_VLM_DEVICE_ID.

include:
  - path: ${MDX_SAMPLE_APPS_DIR}/nim/cosmos-reason2-8b/compose.yml
  - path: ${MDX_SAMPLE_APPS_DIR}/nim/nvidia-nemotron-nano-9b-v2/compose.yml
